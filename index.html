<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>suttipongp.github.io</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1416;
        --panel: #181d20;
        --text: #f2f5f4;
        --muted: #98a3a0;
        --line: #2d3638;
        --accent: #58b7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(88, 183, 255, 0.16), transparent 32rem),
          linear-gradient(135deg, #101315 0%, #151819 55%, #0f1416 100%);
        color: var(--text);
        font-family: "Segoe UI", Arial, sans-serif;
      }

      main {
        width: min(760px, 100%);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(24, 29, 32, 0.92);
        padding: 28px;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.25);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.8rem);
        line-height: 1;
      }

      p {
        margin-top: 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      .sites {
        margin-top: 24px;
        display: grid;
        gap: 12px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .site-link {
        display: block;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 18px;
        background: rgba(32, 39, 43, 0.9);
      }

      .site-link:hover {
        border-color: var(--accent);
      }

      .site-link h2 {
        font-size: 1.1rem;
      }

      .site-link span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Suttipongp Sites</h1>
        <p>Select a site hosted under this GitHub Pages account.</p>

        <div class="sites">
          <a class="site-link" href="./crypto-info/">
            <h2>Crypto Info</h2>
            <span>Live crypto dashboard with watchlist, market ticker, and 30-second refresh.</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crypto Info</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Crypto Info</h1>
          <p id="status">Starting live feed...</p>
        </div>
        <div class="controls">
          <select id="currency" aria-label="Currency">
            <option value="usd">USD</option>
            <option value="thb">THB</option>
            <option value="eur">EUR</option>
            <option value="gbp">GBP</option>
            <option value="jpy">JPY</option>
          </select>
          <button id="refresh" type="button">Refresh</button>
        </div>
      </header>

      <section class="ticker" id="ticker" aria-label="Market ticker"></section>

      <section class="watchlist">
        <div class="section-heading">
          <h2>Watchlist</h2>
          <form id="coin-form">
            <input
              id="coin-input"
              type="text"
              placeholder="coin id, e.g. ripple"
              autocomplete="off"
              aria-label="Add coin by CoinGecko id"
            />
            <button type="submit">Add</button>
          </form>
        </div>
        <div class="grid" id="cards"></div>
      </section>
    </main>

    <template id="coin-card-template">
      <article class="coin-card">
        <button class="remove" type="button" title="Remove coin">x</button>
        <div class="coin-head">
          <img class="coin-image" alt="" />
          <div>
            <h3 class="coin-name"></h3>
            <span class="coin-symbol"></span>
          </div>
        </div>
        <div class="coin-price"></div>
        <div class="coin-meta">
          <span class="change"></span>
          <span class="volume"></span>
        </div>
        <canvas class="sparkline" width="360" height="82"></canvas>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
